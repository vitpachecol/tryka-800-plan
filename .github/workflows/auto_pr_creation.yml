name: Auto PR Creation

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pull-request:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v4
      with:
        token: ${{ secrets.claw }}
        title: "[${{ github.ref_name }}] Changes ready for review"
        body: |
          Automated PR created by Claw.
          
          Branch: `${{ github.ref_name }}`
          
          Please review and merge when ready.
        branch: ${{ github.ref_name }}
        base: main
        reviewers: vitpachecol