name: Automated PR Creation

on:
  push:
    branches:
      - 'non-breaking-update'
  workflow_dispatch: {}

jobs:
  create-pull-request:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Automated PR: Non-breaking comment addition"
        title: "[Automation] Non-Breaking Comment Change"
        body: "This is an automated PR created by the assistant."
        branch: "non-breaking-update"
        reviewers: "vpleepkaln"