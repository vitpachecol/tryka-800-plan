name: Automated PR Creation

on:
  push:
    branches:
      - 'non-breaking-update'
  workflow_dispatch: {}

jobs:
  create-pull-request:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v4
      with:
        token: ${{ secrets.claw }}
        commit-message: "Automated PR for changes in non-breaking-update"
        title: "[Automation] Changes from non-breaking-update"
        body: "This is an automated PR created by the assistant for testing purposes."
        branch: "non-breaking-update"
        base: "main"
        reviewers: "vpleepkaln"