name: Auto PR Creation

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pull-request:
    runs-on: ubuntu-latest

    steps:
    - name: Create Pull Request via GitHub API
      run: |
        BRANCH="${{ github.ref_name }}"
        REPO="${{ github.repository }}"
        TITLE="[$BRANCH] Changes ready for review"
        BODY="Automated PR created by Claw.\n\nBranch: \`$BRANCH\`\n\nPlease review and merge when ready."

        # Check if PR already exists
        EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer ${{ secrets.claw }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$REPO/pulls?head=${{ github.repository_owner }}:$BRANCH&base=main&state=open")

        if [ "$EXISTING" = "200" ]; then
          PR_COUNT=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.claw }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls?head=${{ github.repository_owner }}:$BRANCH&base=main&state=open" | jq length)

          if [ "$PR_COUNT" -gt "0" ]; then
            echo "PR already exists for branch $BRANCH, skipping."
            exit 0
          fi
        fi

        # Create the PR
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.claw }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/$REPO/pulls \
          -d "{
            \"title\": \"$TITLE\",
            \"body\": \"$BODY\",
            \"head\": \"$BRANCH\",
            \"base\": \"main\",
            \"draft\": false
          }"